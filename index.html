<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project 215</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --text: #ffffff;
    }

    body {
      background: #111;
      color: var(--text);
      font-family: "Inter", sans-serif;
    }

    .hero {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.65), rgba(0,0,0,0.58)),
        url("./background.jpg") center center / cover no-repeat;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 25% 12%, rgba(74, 115, 150, 0.16), transparent 24%),
        radial-gradient(circle at 78% 16%, rgba(60, 95, 135, 0.14), transparent 26%),
        linear-gradient(to bottom, rgba(0,0,0,0.18), rgba(0,0,0,0.34));
      pointer-events: none;
      z-index: 1;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right, rgba(255,255,255,0.07) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 185px 185px;
      opacity: 0.22;
      pointer-events: none;
      z-index: 1;
    }

    .container {
      width: min(94%, 1560px);
      margin: 0 auto;
      position: relative;
      z-index: 3;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      padding: 20px 0 0;
    }

    .left-group {
      display: flex;
      align-items: flex-start;
      gap: 42px;
    }

    .logo img {
      width: 250px;
      max-width: 100%;
      display: block;
      object-fit: contain;
    }

    .call-wrap {
      text-align: center;
      margin-top: 18px;
    }

    .call-wrap .label {
      font-family: "Oswald", sans-serif;
      font-size: 34px;
      font-weight: 300;
      line-height: 1;
      margin-bottom: 14px;
      color: rgba(255,255,255,0.95);
    }

    .call-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 172px;
      padding: 16px 28px;
      border-radius: 8px;
      background: rgba(255,255,255,0.96);
      color: #111;
      text-decoration: none;
      font-family: "Oswald", sans-serif;
      font-size: 18px;
      font-weight: 600;
    }

    .right-group {
      display: flex;
      align-items: center;
      gap: 28px;
      flex-wrap: wrap;
      justify-content: flex-end;
      padding-top: 28px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 34px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: #fff;
      text-decoration: none;
      font-family: "Oswald", sans-serif;
      font-size: 18px;
      font-weight: 500;
      text-transform: uppercase;
    }

    .nav-links a span {
      font-size: 12px;
      margin-left: 4px;
      position: relative;
      top: -1px;
    }

    .appoint-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 230px;
      padding: 17px 26px;
      border-radius: 6px;
      background: rgba(255,255,255,0.96);
      color: #111;
      text-decoration: none;
      font-family: "Oswald", sans-serif;
      font-size: 18px;
      font-weight: 500;
      text-transform: uppercase;
    }

    .hero-body {
      position: relative;
      min-height: calc(100vh - 120px);
      padding: 40px 0 42px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .ghost-title {
      position: absolute;
      left: 40px;
      right: 40px;
      top: 128px;
      text-align: center;
      font-family: "Oswald", sans-serif;
      font-size: clamp(110px, 13vw, 250px);
      line-height: 0.9;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.06);
      user-select: none;
      pointer-events: none;
      white-space: nowrap;
      z-index: 2;
    }

    .cars-bg {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 240px;
      width: min(88%, 1220px);
      z-index: 2;
      pointer-events: none;
    }

    .cars-bg img {
      width: 100%;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 16px 25px rgba(0,0,0,0.45));
    }

    .floor-strip {
      width: 100%;
      height: 90px;
      background: linear-gradient(to right, #bba58b, #cab69d, #b79f87);
      box-shadow: inset 0 10px 14px rgba(255,255,255,0.09);
      position: relative;
      z-index: 2;
    }

    .bottom-copy {
      position: relative;
      z-index: 3;
      padding-top: 14px;
      padding-left: 8px;
      max-width: 1200px;
    }

    .reviews {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: "Oswald", sans-serif;
      font-size: 18px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.95);
      margin-bottom: 10px;
    }

    .stars {
      font-size: 20px;
      letter-spacing: 2px;
    }

    .subheading {
      font-family: "Oswald", sans-serif;
      font-size: clamp(28px, 3vw, 52px);
      font-weight: 300;
      line-height: 1.05;
      margin-bottom: 14px;
    }

    .main-heading {
      font-family: "Oswald", sans-serif;
      font-size: clamp(56px, 6vw, 100px);
      line-height: 0.95;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .main-heading strong {
      font-weight: 700;
    }

    @media (max-width: 1200px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .right-group {
        justify-content: flex-start;
        padding-top: 8px;
      }

      .ghost-title {
        white-space: normal;
      }

      .cars-bg {
        bottom: 260px;
        width: min(92%, 1100px);
      }
    }

    @media (max-width: 900px) {
      .left-group {
        flex-direction: column;
        gap: 18px;
      }

      .right-group {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }

      .nav-links {
        gap: 18px;
      }

      .ghost-title {
        top: 240px;
        font-size: 78px;
      }

      .cars-bg {
        bottom: 250px;
      }

      .floor-strip {
        height: 70px;
      }
    }

    @media (max-width: 640px) {
      .logo img {
        width: 180px;
      }

      .call-btn,
      .appoint-btn {
        width: 100%;
        min-width: unset;
      }

      .nav-links {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px 18px;
        width: 100%;
      }

      .ghost-title {
        top: 320px;
        font-size: 56px;
      }

      .cars-bg {
        width: 95%;
        bottom: 220px;
      }

      .reviews {
        font-size: 14px;
      }

      .subheading {
        font-size: 26px;
      }

      .main-heading {
        font-size: 42px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="container">
      <header class="topbar">
        <div class="left-group">
          <div class="logo">
            <img src="./logo.png" alt="Project 215 Logo">
          </div>

          <div class="call-wrap">
            <div class="label">Call Today</div>
            <a href="tel:3104777057" class="call-btn">(310) 477-7057</a>
          </div>
        </div>

        <div class="right-group">
          <nav class="nav-links">
            <a href="#">Home</a>
            <a href="#">About <span>▼</span></a>
            <a href="#">Services <span>▼</span></a>
            <a href="#">Makes <span>▼</span></a>
            <a href="#">Tire Pros <span>▼</span></a>
            <a href="#">Specials</a>
            <a href="#">Contact</a>
          </nav>

          <a href="#" class="appoint-btn">Request Appointment</a>
        </div>
      </header>

      <div class="hero-body">
        <div class="ghost-title">PROJECT 215</div>

        <div class="cars-bg">
          <img src="./cars.png" alt="Luxury and service vehicles">
        </div>

        <div class="floor-strip"></div>

        <div class="bottom-copy">
          <div class="reviews">
            <span class="stars">★★★★★</span>
            <span>2,375+ Google Reviews</span>
          </div>

          <div class="subheading">Auto Repair In Los Angeles, CA</div>

          <h1 class="main-heading">
            Welcome To <strong>Project 215</strong>
          </h1>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
