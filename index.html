<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>West Coast Tire & Service</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #05070a;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.75);
      --soft: rgba(255,255,255,0.12);
      --card: rgba(255,255,255,0.92);
      --black: #0b0d10;
    }

    body {
      background: #111;
      color: var(--text);
      font-family: "Inter", sans-serif;
    }

    .hero {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.72), rgba(0,0,0,0.62)),
        url("background.jpg") center center / cover no-repeat;
    }

    /* dark overlay to mimic screenshot */
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 25% 18%, rgba(75,110,140,0.22), transparent 28%),
        radial-gradient(circle at 75% 10%, rgba(50,90,130,0.18), transparent 30%),
        linear-gradient(to bottom, rgba(2,5,8,0.4), rgba(2,5,8,0.7));
      pointer-events: none;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right, rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 220px 220px;
      opacity: 0.18;
      pointer-events: none;
    }

    .container {
      width: min(94%, 1550px);
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 20px 0 10px;
    }

    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 42px;
      min-width: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 250px;
      max-width: 100%;
    }

    .logo img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      filter: brightness(1.15);
    }

    .call-box-wrap {
      text-align: center;
      flex-shrink: 0;
    }

    .call-box-wrap .label {
      font-family: "Oswald", sans-serif;
      font-size: 36px;
      font-weight: 300;
      line-height: 1;
      color: rgba(255,255,255,0.9);
      margin-bottom: 14px;
    }

    .call-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 170px;
      padding: 16px 28px;
      background: rgba(255,255,255,0.95);
      color: #111;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 800;
      font-size: 18px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.18);
    }

    .nav-area {
      display: flex;
      align-items: center;
      gap: 34px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 34px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-family: "Oswald", sans-serif;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .nav-links a span {
      font-size: 12px;
      position: relative;
      top: -1px;
      margin-left: 5px;
      opacity: 0.85;
    }

    .appoint-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.95);
      color: #111;
      text-decoration: none;
      font-family: "Oswald", sans-serif;
      font-weight: 500;
      font-size: 19px;
      text-transform: uppercase;
      padding: 16px 28px;
      border-radius: 6px;
      min-width: 230px;
    }

    .hero-content {
      position: relative;
      padding-top: 70px;
      padding-bottom: 70px;
      min-height: calc(100vh - 110px);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .ghost-title {
      position: absolute;
      left: 35px;
      right: 35px;
      top: 120px;
      text-align: center;
      font-family: "Oswald", sans-serif;
      font-size: clamp(92px, 13vw, 255px);
      font-weight: 700;
      letter-spacing: 2px;
      line-height: 0.88;
      color: rgba(255,255,255,0.06);
      text-transform: uppercase;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }

    .cars-row {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: end;
      margin-bottom: 10px;
      margin-top: 60px;
    }

    .cars-row img {
      width: min(92%, 1180px);
      max-height: 420px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 24px 30px rgba(0,0,0,0.5));
    }

    .floor-strip {
      width: 100%;
      height: 92px;
      background: linear-gradient(to right, #bca58b, #c6b299, #b79f87);
      border-radius: 0;
      margin-top: -12px;
      box-shadow: inset 0 12px 16px rgba(255,255,255,0.1);
    }

    .bottom-copy {
      padding-top: 14px;
      padding-left: 10px;
      max-width: 1200px;
    }

    .reviews {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.95);
      font-family: "Oswald", sans-serif;
      font-size: 18px;
      letter-spacing: 0.2px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .stars {
      font-size: 20px;
      letter-spacing: 2px;
    }

    .subheading {
      font-family: "Oswald", sans-serif;
      font-size: clamp(28px, 3.2vw, 54px);
      font-weight: 300;
      line-height: 1.05;
      color: rgba(255,255,255,0.96);
      margin-bottom: 10px;
    }

    .main-heading {
      font-family: "Oswald", sans-serif;
      font-size: clamp(54px, 6vw, 105px);
      line-height: 0.95;
      text-transform: uppercase;
      font-weight: 300;
      letter-spacing: 1px;
    }

    .main-heading strong {
      font-weight: 700;
    }

    @media (max-width: 1200px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .brand-wrap,
      .nav-area {
        width: 100%;
      }

      .nav-area {
        justify-content: space-between;
      }

      .ghost-title {
        top: 190px;
        white-space: normal;
      }
    }

    @media (max-width: 900px) {
      .brand-wrap {
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
      }

      .nav-area {
        flex-direction: column;
        align-items: flex-start;
        gap: 18px;
      }

      .nav-links {
        gap: 18px;
      }

      .call-box-wrap .label {
        font-size: 30px;
      }

      .ghost-title {
        font-size: 72px;
        top: 240px;
      }

      .hero-content {
        padding-top: 40px;
      }

      .cars-row {
        margin-top: 110px;
      }

      .floor-strip {
        height: 70px;
      }
    }

    @media (max-width: 640px) {
      .logo {
        width: 180px;
      }

      .call-btn,
      .appoint-btn {
        min-width: unset;
        width: 100%;
      }

      .nav-links {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        width: 100%;
      }

      .ghost-title {
        font-size: 54px;
        top: 285px;
      }

      .cars-row {
        margin-top: 120px;
      }

      .reviews {
        font-size: 15px;
      }

      .subheading {
        font-size: 26px;
      }

      .main-heading {
        font-size: 44px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="container">
      <header class="topbar">
        <div class="brand-wrap">
          <div class="logo">
            <!-- Replace with your logo file -->
            <img src="logo.png" alt="West Coast Tire & Service Logo">
          </div>

          <div class="call-box-wrap">
            <div class="label">Call Today</div>
            <a href="tel:3104777057" class="call-btn">(310) 477-7057</a>
          </div>
        </div>

        <div class="nav-area">
          <nav class="nav-links">
            <a href="#">Home</a>
            <a href="#">About <span>▼</span></a>
            <a href="#">Services <span>▼</span></a>
            <a href="#">Makes <span>▼</span></a>
            <a href="#">Tire Pros <span>▼</span></a>
            <a href="#">Specials</a>
            <a href="#">Contact</a>
          </nav>

          <a href="#" class="appoint-btn">Request Appointment</a>
        </div>
      </header>

      <div class="hero-content">
        <div class="ghost-title">WEST COAST TIRE</div>

        <div class="cars-row">
          <!-- Replace with your transparent PNG of the vehicles -->
          <img src="cars.png" alt="Luxury and service vehicles">
        </div>

        <div class="floor-strip"></div>

        <div class="bottom-copy">
          <div class="reviews">
            <span class="stars">★★★★★</span>
            <span>2,375+ Google Reviews</span>
          </div>

          <div class="subheading">Auto Repair In Los Angeles, CA</div>

          <h1 class="main-heading">
            Welcome To <strong>West Coast Tire &amp; Service</strong>
          </h1>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
